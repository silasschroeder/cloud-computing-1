---
- name: Hadoop Datalake Installation
  hosts: all
  become: yes
  vars:
    hadoop_version: "3.3.6"
    hadoop_home: "/opt/hadoop"
    java_home: "/usr/lib/jvm/java-11-openjdk-amd64"
    master_host: "{{ groups['master'][0] }}"
    worker_hosts: "{{ groups['worker'] }}"
  tasks:
    - name: Installiere benötigte Pakete
      apt:
        name:
          - openjdk-11-jdk
          - ssh
          - rsync
        update_cache: yes

    - name: Stelle sicher, dass ein ed25519 SSH-Key existiert
      ansible.builtin.openssh_keypair:
        path: /home/ubuntu/.ssh/id_ed25519
        type: ed25519
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      become_user: ubuntu

    - name: Lese Public-Key ein und speichere als Hostvar
      ansible.builtin.slurp:
        src: /home/ubuntu/.ssh/id_ed25519.pub
      register: pubkey_raw

    - name: Setze Public-Key als Hostvar
      set_fact:
        my_pubkey: "{{ pubkey_raw.content | b64decode }}"

    - name: Sammle alle Public-Keys auf dem Controller
      run_once: true
      delegate_to: localhost
      set_fact:
        all_pubkeys: "{{ query('inventory_hostnames', 'all') | map('extract', hostvars, 'my_pubkey') | list }}"

    - name: Füge alle Public-Keys zu authorized_keys hinzu
      ansible.builtin.lineinfile:
        path: /home/ubuntu/.ssh/authorized_keys
        line: "{{ item }}"
        create: yes
        state: present
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      loop: "{{ all_pubkeys }}"
      become_user: ubuntu

    - name: Trage alle Cluster-IPs und Hostnamen in /etc/hosts ein
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item]['ansible_host'] }} {{ item }}"
        state: present
        create: yes
      loop: "{{ groups['all'] }}"
      become: yes

    - name: Lade Hadoop herunter
      get_url:
        url: "https://downloads.apache.org/hadoop/common/hadoop-{{ hadoop_version }}/hadoop-{{ hadoop_version }}.tar.gz"
        dest: "/tmp/hadoop-{{ hadoop_version }}.tar.gz"

    - name: Entpacke Hadoop
      unarchive:
        src: "/tmp/hadoop-{{ hadoop_version }}.tar.gz"
        dest: /opt
        remote_src: yes
      args:
        creates: "{{ hadoop_home }}"

    - name: Setze Hadoop-Verzeichnis
      file:
        src: "/opt/hadoop-{{ hadoop_version }}"
        dest: "{{ hadoop_home }}"
        state: link
      when: not (hadoop_home is directory)

    - name: Setze Umgebungsvariablen
      copy:
        dest: /etc/profile.d/hadoop.sh
        content: |
          export JAVA_HOME={{ java_home }}
          export HADOOP_HOME={{ hadoop_home }}
          export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_HOME/sbin
        mode: '0644'

    - name: Lade Umgebungsvariablen
      shell: source /etc/profile.d/hadoop.sh
      args:
        executable: /bin/bash

    - name: Erstelle HDFS-Verzeichnisse
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      loop:
        - /opt/hadoop_data/hdfs/namenode
        - /opt/hadoop_data/hdfs/datanode

    - name: Setze JAVA_HOME in hadoop-env.sh
      lineinfile:
        path: "{{ hadoop_home }}/etc/hadoop/hadoop-env.sh"
        regexp: '^export JAVA_HOME='
        line: "export JAVA_HOME={{ java_home }}"
        create: yes
        mode: '0644'
      become: yes
      tags: java

    - name: Konfiguriere core-site.xml
      template:
        src: core-site.xml.j2
        dest: "{{ hadoop_home }}/etc/hadoop/core-site.xml"

    - name: Konfiguriere hdfs-site.xml
      template:
        src: hdfs-site.xml.j2
        dest: "{{ hadoop_home }}/etc/hadoop/hdfs-site.xml"

    - name: Konfiguriere mapred-site.xml
      template:
        src: mapred-site.xml.j2
        dest: "{{ hadoop_home }}/etc/hadoop/mapred-site.xml"

    - name: Konfiguriere yarn-site.xml
      template:
        src: yarn-site.xml.j2
        dest: "{{ hadoop_home }}/etc/hadoop/yarn-site.xml"

    - name: Format NameNode (nur beim ersten Setup, nur auf Master)
      shell: . /etc/profile.d/hadoop.sh && /opt/hadoop/bin/hdfs namenode -format -force
      args:
        creates: /opt/hadoop_data/hdfs/namenode/current
        executable: /bin/bash
      when: inventory_hostname == master_host
      become: yes
      become_user: ubuntu
      environment:
        HOME: /home/ubuntu

    - name: Schreibe Worker-Liste
      copy:
        dest: "{{ hadoop_home }}/etc/hadoop/workers"
        content: |
          {% for host in worker_hosts %}{{ host }}
          {% endfor %}
        mode: '0644'

    - name: Starte DataNode auf Workern
      shell: |
        source /etc/profile.d/hadoop.sh
        /opt/hadoop/sbin/hadoop-daemon.sh start datanode
      args:
        executable: /bin/bash
      when: inventory_hostname in worker_hosts
      become: yes
      become_user: ubuntu
      environment:
        HOME: /home/ubuntu
      ignore_errors: true

    - name: Warten auf NameNode-Initialisierung
      shell: sleep 3
      when: inventory_hostname == master_host

    - name: Starte Hadoop-Dienste (nur auf Master)
      shell: |
        source /etc/profile.d/hadoop.sh
        /opt/hadoop/sbin/start-dfs.sh
        /opt/hadoop/sbin/start-yarn.sh
      when: inventory_hostname == master_host
      become: yes
      become_user: ubuntu
      environment:
        HOME: /home/ubuntu

    - name: Neustart aller DataNodes (nur auf Workern)
      shell: |
        source /etc/profile.d/hadoop.sh
        /opt/hadoop/sbin/hadoop-daemon.sh stop datanode
        sleep 10
        nohup /opt/hadoop/sbin/hadoop-daemon.sh start datanode > /opt/hadoop/logs/datanode_start.log 2>&1 &
        sleep 5
        jps | grep DataNode || (echo "DataNode nicht gestartet, versuche erneut..." && nohup /opt/hadoop/sbin/hadoop-daemon.sh start datanode > /opt/hadoop/logs/datanode_start.log 2>&1 &)
      args:
        executable: /bin/bash
      when: inventory_hostname in worker_hosts
      become: yes
      become_user: ubuntu
      environment:
        HOME: /home/ubuntu