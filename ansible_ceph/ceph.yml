---
- name: Ceph Minimal Cluster Installation
  hosts: ceph-nodes
  become: yes
  vars:
    ceph_release: reef
    public_network: "{{ ansible_default_ipv4.network }}/24"
  tasks:
    - name: Installiere benötigte Pakete
      apt:
        name:
          - lsb-release
          - gnupg
          - curl
          - software-properties-common
        update_cache: yes

    - name: Füge Ceph-Repository hinzu
      apt_repository:
        repo: "deb https://download.ceph.com/debian-{{ ceph_release }}/ {{ ansible_lsb.codename }} main"
        state: present
        filename: ceph

    - name: Importiere Ceph GPG-Key
      apt_key:
        url: https://download.ceph.com/keys/release.asc
        state: present

    - name: Installiere Ceph Pakete
      apt:
        name:
          - ceph
          - ceph-common
          - ceph-mds
        update_cache: yes

    - name: Initialisiere Ceph Cluster (nur auf erstem Knoten)
      command: ceph-deploy new {{ inventory_hostname }}
      args:
        chdir: /tmp/ceph-cluster
      when: inventory_hostname == groups['ceph-nodes'][0]
      ignore_errors: yes

    - name: Installiere Ceph auf allen Knoten
      command: ceph-deploy install {{ item }}
      args:
        chdir: /tmp/ceph-cluster
      loop: "{{ groups['ceph-nodes'] }}"
      when: inventory_hostname == groups['ceph-nodes'][0]
      ignore_errors: yes

    - name: Initialisiere Monitors und Manager (nur auf erstem Knoten)
      command: ceph-deploy mon create-initial
      args:
        chdir: /tmp/ceph-cluster
      when: inventory_hostname == groups['ceph-nodes'][0]
      ignore_errors: yes

    - name: Füge OSDs hinzu (nur auf erstem Knoten)
      command: ceph-deploy osd create --data /dev/vdb {{ item }}
      args:
        chdir: /tmp/ceph-cluster
      loop: "{{ groups['ceph-nodes'] }}"
      when: inventory_hostname == groups['ceph-nodes'][0]
      ignore_errors: yes

    - name: Kopiere ceph.conf und Schlüssel auf alle Knoten
      command: ceph-deploy admin {{ item }}
      args:
        chdir: /tmp/ceph-cluster
      loop: "{{ groups['ceph-nodes'] }}"
      when: inventory_hostname == groups['ceph-nodes'][0]
      ignore_errors: yes

    - name: Setze Berechtigungen für ceph.client.admin.keyring
      file:
        path: /etc/ceph/ceph.client.admin.keyring
        owner: root
        group: root
        mode: '0600'
      ignore_errors: yes
