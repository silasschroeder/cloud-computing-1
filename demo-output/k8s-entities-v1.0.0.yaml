---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-web-app
  labels:
    app: sample-web-app
    version: 1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-web-app
  template:
    metadata:
      labels:
        app: sample-web-app
        version: 1.0.0
    spec:
      containers:
        - name: sample-web-app
          image: node:16-alpine
          env:
            - name: APP_VERSION
              value: "1.0.0"
          command:
            - /bin/sh
            - -c
            - |
              echo "Sample Web Application - Version 1.0.0"
              echo "This demonstrates version 1.0.0 deployment"
              while true; do sleep 30; done
---
apiVersion: v1
kind: Service
metadata:
  name: sample-web-app-service
spec:
  selector:
    app: sample-web-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
