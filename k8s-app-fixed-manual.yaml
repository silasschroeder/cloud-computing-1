apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-counter-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simple-counter-app
  template:
    metadata:
      labels:
        app: simple-counter-app
    spec:
      containers:
      - name: simple-counter-app
        image: nginx:alpine
        ports:
        - containerPort: 80
        command: ["sh", "-c"]
        args:
        - |
          cat > /usr/share/nginx/html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Simple Counter App v1.2-manual</title>
              <meta charset="utf-8">
          </head>
          <body style="font-family: Arial; text-align: center; margin: 50px;">
              <h1>Simple Counter App v1.2-manual</h1>
              <h2 style="color: blue; font-size: 3em;" id="counter">0</h2>
              <p>Aufrufe insgesamt</p>
              <p><strong>Pod:</strong> <span id="pod">Loading...</span></p>
              <p><em>Aktualisiert: <span id="time">Loading...</span></em></p>
              <button onclick="updateCounter()">Aktualisieren</button>
              
              <script>
              let counter = 0;
              
              function updateCounter() {
                  counter++;
                  document.getElementById('counter').textContent = counter;
                  document.getElementById('time').textContent = new Date().toLocaleString('de-DE');
              }
              
              // Initial load
              document.getElementById('pod').textContent = window.location.hostname || 'Pod-Info nicht verfügbar';
              document.getElementById('time').textContent = new Date().toLocaleString('de-DE');
              </script>
          </body>
          </html>
          HTMLEOF
          nginx -g 'daemon off;'
---
apiVersion: v1
kind: Service
metadata:
  name: simple-counter-service
spec:
  selector:
    app: simple-counter-app
  ports:
  - port: 80
    targetPort: 80
  type: NodePort
