apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-counter-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simple-counter-app
  template:
    metadata:
      labels:
        app: simple-counter-app
    spec:
      containers:
      - name: simple-counter-app
        image: node:18-alpine
        ports:
        - containerPort: 3000
        env:
        - name: DATA_DIR
          value: "/shared-data"
        volumeMounts:
        - name: shared-counter-storage
          mountPath: /shared-data
        command: ["sh", "-c"]
        args:
        - |
          cd /tmp && npm init -y && npm install express lockfile --save
          node -e "
          const express = require('express');
          const fs = require('fs');
          const path = require('path');
          const lockFile = require('lockfile');
          const app = express();
          
          const dataDir = process.env.DATA_DIR || '/shared-data';
          const counterFile = path.join(dataDir, 'global-counter.txt');
          const lockFilePath = path.join(dataDir, 'counter.lock');
          
          // Ensure data directory exists
          if (!fs.existsSync(dataDir)) {
            fs.mkdirSync(dataDir, { recursive: true });
          }
          
          function readGlobalCounter() {
            try {
              if (fs.existsSync(counterFile)) {
                const fileContent = fs.readFileSync(counterFile, 'utf8').trim();
                const count = parseInt(fileContent) || 0;
                console.log('🔄 Global counter read:', count);
                return count;
              } else {
                console.log('📝 No global counter file found, starting at 0');
                return 0;
              }
            } catch (err) {
              console.log('❌ Error reading global counter, starting at 0:', err.message);
              return 0;
            }
          }
          
          function incrementGlobalCounter() {
            return new Promise((resolve, reject) => {
              lockFile.lock(lockFilePath, { wait: 5000 }, (err) => {
                if (err) {
                  console.error('❌ Failed to acquire lock:', err);
                  resolve(readGlobalCounter()); // Return current count without increment
                  return;
                }
                
                try {
                  const currentCount = readGlobalCounter();
                  const newCount = currentCount + 1;
                  fs.writeFileSync(counterFile, newCount.toString());
                  console.log('✅ Global counter incremented:', currentCount, '->', newCount);
                  
                  lockFile.unlock(lockFilePath, (unlockErr) => {
                    if (unlockErr) console.error('⚠️ Failed to unlock:', unlockErr);
                  });
                  
                  resolve(newCount);
                } catch (writeErr) {
                  console.error('❌ Error incrementing counter:', writeErr);
                  lockFile.unlock(lockFilePath, () => {});
                  resolve(readGlobalCounter());
                }
              });
            });
          }
          
          function resetGlobalCounter() {
            return new Promise((resolve, reject) => {
              lockFile.lock(lockFilePath, { wait: 5000 }, (err) => {
                if (err) {
                  console.error('❌ Failed to acquire lock for reset:', err);
                  resolve(false);
                  return;
                }
                
                try {
                  fs.writeFileSync(counterFile, '0');
                  console.log('🗑️ Global counter reset to 0');
                  
                  lockFile.unlock(lockFilePath, (unlockErr) => {
                    if (unlockErr) console.error('⚠️ Failed to unlock after reset:', unlockErr);
                  });
                  
                  resolve(true);
                } catch (writeErr) {
                  console.error('❌ Error resetting counter:', writeErr);
                  lockFile.unlock(lockFilePath, () => {});
                  resolve(false);
                }
              });
            });
          }
          
          app.get('/', async (req, res) => {
            const globalCounter = await incrementGlobalCounter();
            const pod = process.env.HOSTNAME || 'unknown-pod';
            
            const html = `<!DOCTYPE html>
            <html>
            <head>
                <title>Global Counter App v2.0</title>
                <meta charset='utf-8'>
            </head>
            <body style='font-family: Arial; text-align: center; margin: 50px;'>
                <h1 style='color: green;'>🌍 Global Counter App v2.0</h1>
                <h2 style='color: blue; font-size: 5em;'>${globalCounter}</h2>
                <p><strong>🔢 Globale Aufrufe über ALLE Worker</strong></p>
                <p><strong>🚀 Aktueller Pod:</strong> ${pod}</p>
                <p><em>⏰ Letzte Aktualisierung:</em> ${new Date().toLocaleString('de-DE')}</p>
                <div style='margin-top: 30px;'>
                  <button onclick='location.reload()' style='padding: 15px 30px; font-size: 18px; margin: 10px; background: blue; color: white; border: none; cursor: pointer; border-radius: 5px;'>
                    🔄 Globalen Counter erhöhen
                  </button><br>
                  <a href='/reset' style='display: inline-block; padding: 15px 30px; font-size: 18px; margin: 10px; background: red; color: white; text-decoration: none; border-radius: 5px;'>
                    🗑️ Globalen Counter zurücksetzen
                  </a>
                  <a href='/stats' style='display: inline-block; padding: 15px 30px; font-size: 18px; margin: 10px; background: green; color: white; text-decoration: none; border-radius: 5px;'>
                    📊 JSON Stats
                  </a>
                </div>
                <div style='margin-top: 30px; font-size: 14px; color: #666; border: 1px solid #ddd; padding: 20px; border-radius: 10px;'>
                  <h3>🔥 Features:</h3>
                  <p>💾 <strong>Shared Storage:</strong> Counter wird in /shared-data/global-counter.txt gespeichert</p>
                  <p>🔒 <strong>Thread-Safe:</strong> Verwendet Locks für gleichzeitige Zugriffe</p>
                  <p>🌍 <strong>Global:</strong> Ein Counter für alle ${3} Worker-Pods</p>
                  <p>🔄 <strong>Persistent:</strong> Überlebt Pod-Restarts und Deployments</p>
                </div>
            </body>
            </html>`;
            res.send(html);
          });
          
          app.get('/reset', async (req, res) => {
            const success = await resetGlobalCounter();
            res.redirect('/');
          });
          
          app.get('/stats', async (req, res) => {
            const currentCount = readGlobalCounter();
            const pod = process.env.HOSTNAME || 'unknown-pod';
            const stats = {
              globalCounter: currentCount,
              pod: pod,
              timestamp: new Date().toISOString(),
              dataFile: counterFile,
              lockFile: lockFilePath,
              uptime: process.uptime(),
              replicas: 3,
              storageType: 'shared-nfs'
            };
            res.json(stats);
          });
          
          app.listen(3000, '0.0.0.0', () => {
            const initialCount = readGlobalCounter();
            console.log('🚀 Global Counter App started on port 3000');
            console.log('🌍 Shared counter at startup:', initialCount);
            console.log('💾 Data stored in:', counterFile);
            console.log('🔒 Lock file:', lockFilePath);
          });
          "
      volumes:
      - name: shared-counter-storage
        nfs:
          server: MASTER_IP_PLACEHOLDER
          path: /mnt/data
---
apiVersion: v1
kind: Service
metadata:
  name: simple-counter-service
spec:
  selector:
    app: simple-counter-app
  ports:
  - port: 80
    targetPort: 3000
  type: NodePort
