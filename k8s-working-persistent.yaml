apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-counter-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simple-counter-app
  template:
    metadata:
      labels:
        app: simple-counter-app
    spec:
      containers:
      - name: simple-counter-app
        image: node:18-alpine
        ports:
        - containerPort: 3000
        env:
        - name: DATA_DIR
          value: "/data"
        volumeMounts:
        - name: counter-storage
          mountPath: /data
        command: ["sh", "-c"]
        args:
        - |
          cd /tmp && npm init -y && npm install express --save
          node -e "
          const express = require('express');
          const fs = require('fs');
          const path = require('path');
          const app = express();
          
          const dataDir = process.env.DATA_DIR || '/data';
          const counterFile = path.join(dataDir, 'counter.txt');
          
          // Ensure data directory exists
          if (!fs.existsSync(dataDir)) {
            fs.mkdirSync(dataDir, { recursive: true });
          }
          
          // Read counter from file or initialize
          let counter = 0;
          try {
            if (fs.existsSync(counterFile)) {
              const fileContent = fs.readFileSync(counterFile, 'utf8').trim();
              counter = parseInt(fileContent) || 0;
              console.log('Counter loaded from file:', counter);
            } else {
              console.log('No counter file found, starting at 0');
            }
          } catch (err) {
            console.log('Error reading counter, starting at 0:', err.message);
          }
          
          function saveCounter() {
            try {
              fs.writeFileSync(counterFile, counter.toString());
              console.log('Counter saved:', counter);
            } catch (err) {
              console.error('Error saving counter:', err);
            }
          }
          
          app.get('/', (req, res) => {
            counter++;
            saveCounter();
            
            const pod = process.env.HOSTNAME || 'unknown-pod';
            const html = \`<!DOCTYPE html>
            <html>
            <head>
                <title>Persistent Counter App v1.3-working</title>
                <meta charset='utf-8'>
            </head>
            <body style='font-family: Arial; text-align: center; margin: 50px;'>
                <h1 style='color: green;'>✅ Persistent Counter App v1.3</h1>
                <h2 style='color: blue; font-size: 4em;'>\${counter}</h2>
                <p><strong>Gesamte Aufrufe (persistent über Reloads!)</strong></p>
                <p>Pod: \${pod}</p>
                <p>Letzte Aktualisierung: \${new Date().toLocaleString('de-DE')}</p>
                <div style='margin-top: 30px;'>
                  <button onclick='location.reload()' style='padding: 15px 30px; font-size: 18px; margin: 10px; background: blue; color: white; border: none; cursor: pointer;'>
                    🔄 Seite neu laden (Counter +1)
                  </button><br>
                  <a href='/reset' style='display: inline-block; padding: 15px 30px; font-size: 18px; margin: 10px; background: red; color: white; text-decoration: none; border-radius: 5px;'>
                    🗑️ Counter zurücksetzen
                  </a>
                  <a href='/stats' style='display: inline-block; padding: 15px 30px; font-size: 18px; margin: 10px; background: green; color: white; text-decoration: none; border-radius: 5px;'>
                    📊 JSON Stats
                  </a>
                </div>
                <div style='margin-top: 30px; font-size: 14px; color: #666;'>
                  <p>💾 Counter wird in Datei gespeichert: /data/counter.txt</p>
                  <p>🔄 Überleben von Pod-Restarts und Seiten-Reloads!</p>
                </div>
            </body>
            </html>\`;
            res.send(html);
          });
          
          app.get('/reset', (req, res) => {
            const oldCounter = counter;
            counter = 0;
            saveCounter();
            console.log(\`Counter reset from \${oldCounter} to 0\`);
            res.redirect('/');
          });
          
          app.get('/stats', (req, res) => {
            const pod = process.env.HOSTNAME || 'unknown-pod';
            const stats = {
              counter: counter,
              pod: pod,
              timestamp: new Date().toISOString(),
              dataFile: counterFile,
              uptime: process.uptime()
            };
            res.json(stats);
          });
          
          app.listen(3000, '0.0.0.0', () => {
            console.log(\`✅ Persistent Counter App running on port 3000\`);
            console.log(\`📊 Current counter value: \${counter}\`);
            console.log(\`💾 Data stored in: \${counterFile}\`);
          });
          "
      volumes:
      - name: counter-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: simple-counter-service
spec:
  selector:
    app: simple-counter-app
  ports:
  - port: 80
    targetPort: 3000
  type: NodePort
