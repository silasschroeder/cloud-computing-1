apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-app
        image: node:18-alpine
        ports:
        - containerPort: 3000
        command: ["sh", "-c", "npm install express && node -e \"
          const express = require('express');
          const app = express();
          app.get('/', (req, res) => res.send('<h1>Sample App v2.0.0</h1><p>Hello from Kubernetes!</p>'));
          app.listen(3000, '0.0.0.0', () => console.log('App running on port 3000'));
        \""]
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
spec:
  type: NodePort
  ports:
  - port: 3000
    nodePort: 30080
  selector:
    app: sample-app