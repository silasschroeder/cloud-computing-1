apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
    version: 3.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
        version: 3.0
    spec:
      containers:
      - name: sample-app
        image: node:18-alpine
        ports:
        - containerPort: 3000
        command: ["sh", "-c", "npm install express && node -e \"
          const express = require('express');
          const app = express();
          app.get('/', (req, res) => res.send('<h1>Sample App v3.0</h1><p>Hello from Kubernetes!</p><p>Deployed on: Mon Aug 25 23:11:26 EDT 2025</p>'));
          app.listen(3000, '0.0.0.0', () => console.log('App v3.0 running on port 3000'));
        \""]
        env:
        - name: APP_VERSION
          value: "3.0"
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app-service
  labels:
    app: sample-app
    version: 3.0
spec:
  type: NodePort
  ports:
  - port: 3000
    nodePort: 30080
    targetPort: 3000
  selector:
    app: sample-app
